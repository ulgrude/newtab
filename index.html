<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/favicon.ico" />
    <title>New tab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button id="editToggleBtn" title="Mode édition">✏️</button>

    <div class="time-display" id="currentTime">00:00:00</div>

    <div class="links-section" id="linksSection">
        <div class="links-category" data-category="0"></div>
        <div class="links-category" data-category="1"></div>
        <div class="links-category" data-category="2"></div>
    </div>

    <div id="randomImageContainer">
        <img id="randomImage" src="" alt="Random Image" style="display: none;">
    </div>

    <!-- Modal: Add / Edit a link -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2 id="modalTitle">Add a link</h2>
            <label>
                URL
                <input type="url" id="modalUrl" placeholder="https://example.com">
            </label>
            <label>
                Icon (drag &amp; drop or click)
                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*">
                    <span id="dropLabel">Drag an image here or click to choose</span>
                    <img class="preview-img" id="previewImg" alt="Aperçu">
                </div>
            </label>
            <label>
                Alternative text (alt)
                <input type="text" id="modalAlt" placeholder="Link name">
            </label>
            <div class="modal-actions">
                <button class="btn-delete" id="modalDelete" style="display:none;">Delete</button>
                <div class="modal-actions-right">
                    <button class="btn-cancel" id="modalCancel">Cancel</button>
                    <button class="btn-save" id="modalSave">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup: Delete confirmation -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <p>Delete this link?</p>
            <div class="confirm-actions">
                <button class="btn-cancel" id="confirmCancel">Cancel</button>
                <button class="btn-confirm-delete" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
